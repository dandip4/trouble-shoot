{% extends "base.html" %}

{% block title %}Tambah User - Troubleshoot App{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="mb-4">
    <h1 class="h3">Tambah User</h1>
    <p class="text-muted">Buat akun baru dengan role yang sesuai.</p>
  </div>

  <div class="card shadow-sm p-4">
    <form method="POST" action="{{ url_for('admin.tambah_user') }}">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Role</label>
          <select class="form-select" name="role" required>
            <option value="admin">Admin</option>
            <option value="teknisi">Teknisi</option>
            <option value="manajer">Manajer</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Konfirmasi Password</label>
          <input type="password" name="confirm_password" class="form-control" required>
        </div>
        <div class="col-12 form-check">
          <input class="form-check-input" type="checkbox" id="is_active" name="is_active" checked>
          <label class="form-check-label" for="is_active">Aktifkan akun</label>
        </div>
      </div>

      <div class="mt-4">
        <button type="submit" class="btn btn-primary">Simpan User</button>
        <a href="{{ url_for('admin.users') }}" class="btn btn-outline-secondary">Batal</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
